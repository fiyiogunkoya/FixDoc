# Railway config — set the frontend service's Root Directory to `frontend`
# and Railway will read this file automatically. Build context is `frontend/`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# `/` redirects to Clerk's /sign-in when unauthenticated — Railway treats
# the 3xx as unhealthy. Point the probe at /api/health which is explicitly
# public in middleware.ts.
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway config — set the backend service's Root Directory to `backend`
# and Railway will read this file automatically.
#
# Build context is `backend/`, so all paths are service-relative. The
# `fixdoc` library is pulled from git inside the Dockerfile (see the
# FIXDOC_GIT_REF build arg).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Alembic migrations run as part of the container CMD (see Dockerfile),
# so no pre-deploy hook is needed — rollouts are atomic per replica.

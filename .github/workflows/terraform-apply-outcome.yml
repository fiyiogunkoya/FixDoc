name: Record Apply Outcome

on:
  push:
    branches: [main]
    paths:
      - "**/*.tf"

permissions:
  contents: read
  pull-requests: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixdoc
        run: pip install -e .

      - name: Find merged PR and extract fingerprint
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the PR that produced this merge commit
          PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" \
            --json number --jq '.[0].number' 2>/dev/null || echo '')

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for commit ${{ github.sha }}"
            echo "fingerprint=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          # Read FixDoc PR comment and extract fingerprint
          FP=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("fixdoc-risk-analysis")) | .body' \
            | grep -oP '(?<=fixdoc-fingerprint:)[a-f0-9]+' | head -1 || echo '')

          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"

      - name: Run apply
        if: steps.meta.outputs.fingerprint != ''
        id: apply
        run: |
          terraform apply -auto-approve 2>apply_errors.txt \
            && echo "result=success" >> $GITHUB_OUTPUT \
            || echo "result=failure" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Record outcome
        if: steps.meta.outputs.fingerprint != ''
        run: |
          fixdoc outcome record-apply \
            --fingerprint ${{ steps.meta.outputs.fingerprint }} \
            --result ${{ steps.apply.outputs.result }} \
            --error-file apply_errors.txt \
            --commit ${{ github.sha }} \
            --pr ${{ steps.meta.outputs.pr }}

name: FixDoc Terraform Analysis
description: >-
  Uploads a Terraform plan JSON to FixDoc and posts risk analysis as a PR comment.
  Keeps `terraform plan` on the customer's runner so no cloud credentials ever
  leave the customer's infrastructure.

branding:
  icon: shield
  color: purple

inputs:
  plan:
    description: Path to the `terraform show -json` output file
    required: true
  api-key:
    description: >-
      FixDoc API key (fd_live_...). Generate in app.fixdoc.dev/settings.
      Store as a repo secret named FIXDOC_API_KEY.
    required: true
  api-url:
    description: FixDoc API base URL
    required: false
    default: https://api.fixdoc.dev
  installation-id:
    description: GitHub App installation ID (auto-detected from workflow context)
    required: false
  fail-on:
    description: >-
      Severity threshold that fails the action (low|medium|high|critical|never).
      Defaults to `never` — advisory mode.
    required: false
    default: never

outputs:
  score:
    description: Risk score (0-100)
    value: ${{ steps.analyze.outputs.score }}
  severity:
    description: Risk severity (low|medium|high|critical)
    value: ${{ steps.analyze.outputs.severity }}

runs:
  using: composite
  steps:
    - name: Analyze plan
      id: analyze
      shell: bash
      env:
        FIXDOC_API_KEY: ${{ inputs.api-key }}
        FIXDOC_API_URL: ${{ inputs.api-url }}
        FIXDOC_PLAN: ${{ inputs.plan }}
        FIXDOC_FAIL_ON: ${{ inputs.fail-on }}
        FIXDOC_INSTALLATION_ID: ${{ inputs.installation-id || github.event.installation.id }}
        FIXDOC_OWNER: ${{ github.repository_owner }}
        FIXDOC_REPO: ${{ github.event.repository.name }}
        FIXDOC_PR: ${{ github.event.pull_request.number }}
        FIXDOC_COMMIT: ${{ github.event.pull_request.head.sha }}
      run: |
        set -euo pipefail

        if [[ ! -f "$FIXDOC_PLAN" ]]; then
          echo "::error::Plan file not found: $FIXDOC_PLAN"
          exit 1
        fi

        # Build request body — include PR context only if we're actually in a PR
        PR_BLOCK=""
        if [[ -n "${FIXDOC_PR:-}" && -n "${FIXDOC_INSTALLATION_ID:-}" ]]; then
          PR_BLOCK=$(jq -n \
            --argjson install "$FIXDOC_INSTALLATION_ID" \
            --arg owner "$FIXDOC_OWNER" \
            --arg repo "$FIXDOC_REPO" \
            --argjson pr "$FIXDOC_PR" \
            --arg sha "$FIXDOC_COMMIT" \
            '{installation_id:$install, owner:$owner, repo:$repo, pull_number:$pr, commit_sha:$sha}')
        fi

        if [[ -n "$PR_BLOCK" ]]; then
          BODY=$(jq -n --slurpfile plan "$FIXDOC_PLAN" --argjson pr "$PR_BLOCK" \
            '{plan:$plan[0], pr:$pr}')
        else
          BODY=$(jq -n --slurpfile plan "$FIXDOC_PLAN" '{plan:$plan[0]}')
        fi

        RESP=$(curl -sS -X POST "$FIXDOC_API_URL/api/v1/analyze" \
          -H "Authorization: Bearer $FIXDOC_API_KEY" \
          -H "Content-Type: application/json" \
          -d "$BODY")

        SCORE=$(echo "$RESP" | jq -r '.score // 0')
        SEVERITY=$(echo "$RESP" | jq -r '.severity // "low"')
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "severity=$SEVERITY" >> "$GITHUB_OUTPUT"

        echo "## Terraform Risk Analysis" >> "$GITHUB_STEP_SUMMARY"
        echo "$RESP" | jq -r '.markdown // empty' >> "$GITHUB_STEP_SUMMARY"

        # Gating
        declare -A SEV_RANK=([low]=0 [medium]=1 [high]=2 [critical]=3 [never]=99)
        want="${FIXDOC_FAIL_ON:-never}"
        if [[ "$want" != "never" ]]; then
          if (( ${SEV_RANK[$SEVERITY]:-0} >= ${SEV_RANK[$want]:-99} )); then
            echo "::error::Risk $SEVERITY ($SCORE/100) meets or exceeds threshold $want"
            exit 1
          fi
        fi
